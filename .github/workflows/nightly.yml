name: Nightly Build (Development)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    name: Windows Build - Development
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Development branch
        uses: actions/checkout@v4
        with:
          ref: Development
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Dev-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Dev-

      - name: Install video codec dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgstreamer1.0-0 libgstreamer-plugins-base1.0-0

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: eXSert
          unityVersion: 6000.2.15f1

      - name: Zip the build
        run: zip -r eXSert-dev-${{ github.run_number }}.zip build/StandaloneWindows64/

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag nightly-${{ github.run_number }}
          git push origin nightly-${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly Build #${{ github.run_number }}"
          body: "Automated nightly build from the Development branch."
          files: eXSert-dev-${{ github.run_number }}.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}